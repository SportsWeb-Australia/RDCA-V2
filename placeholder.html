<!DOCTYPE html>
<!-- RDCA reusable "intentionally blank" page. Point any link here for a page that
     is blank on the current rdca.com site:
       /placeholder.html?title=Rep%20Team%20U16%20Boys&src=https://www.rdca.com/juniors-under-16s
     ?title = heading shown.  ?src = (optional) the current rdca.com page to link to. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RDCA</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="/_shared.css">
<link rel="stylesheet" href="/_pages.css">
<script src="/rdca-components.js"></script>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0d1f3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/pwa.js" defer></script>
</head>
<body data-page="">

<div data-rdca="masthead"></div>

<header class="page-hero">
  <div class="page-hero-inner">
    <div class="crumb"><a href="/index.html">Home</a> <i class="ti ti-chevron-right"></i> <span id="crumb-title">Page</span></div>
    <div class="eyebrow">RDCA</div>
    <h1 id="hero-title">Page</h1>
  </div>
</header>

<div class="page-wrap">
  <div class="empty-state">
    <div class="empty-ic"><i class="ti ti-file-pencil"></i></div>
    <h2>This page is intentionally blank</h2>
    <p>It mirrors the current RDCA website, which doesn't have content here yet.</p>
    <div class="empty-actions" id="src-action"></div>
    <div class="empty-note"><strong>SportsWeb:</strong> awaiting content direction from RDCA for this page — let us know what you'd like here and we'll add it.</div>
  </div>
</div>

<div data-rdca="sponsor-carousel"></div>
<div data-rdca="footer"></div>

<script>
  (function(){
    var q = new URLSearchParams(location.search);
    var title = q.get("title") || "Page";
    var src = q.get("src") || "";
    document.getElementById("hero-title").textContent = title;
    document.getElementById("crumb-title").textContent = title;
    document.title = title + " — RDCA";
    if (src) {
      document.getElementById("src-action").innerHTML =
        '<a class="btn btn-outline-red" href="' + src.replace(/"/g,"") + '" target="_blank" rel="noopener">View the current page on rdca.com <i class="ti ti-external-link"></i></a>';
    }
  })();
</script>
</body>
</html>
