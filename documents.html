  <div class="page-hero-inner">
    <div class="crumb"><a href="/index.html">Home</a> <i class="ti ti-chevron-right"></i> Documents, Policies &amp; Forms</div>

<script src="/site-data.js"></script>
<script src="/rdca-render.js"></script>
<script>RDCA.render.documents("#docs-mount");
  (function(){
    var f=document.querySelector(".folder-tabs"); if(!f) return;
    f.addEventListener("click",function(e){
      var b=e.target.closest(".folder-tab"); if(!b) return;
      var k=b.getAttribute("data-fld");
      document.querySelectorAll(".folder-tab").forEach(function(t){t.classList.toggle("active",t===b);});
      document.querySelectorAll(".folder-pane").forEach(function(p){p.classList.toggle("active",p.id==="fld-"+k);});
    });
  })();</script>
</body>
