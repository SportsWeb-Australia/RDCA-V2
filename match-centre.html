<!DOCTYPE html>
<!-- RDCA Live Match Centre — multiple games at once. Data: site-data.js
     (matchCentre[]); rendered by rdca-render.js. PlayHQ feed will drive live. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Match Centre — RDCA</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="/_shared.css">
<link rel="stylesheet" href="/_pages.css">
<script src="/rdca-components.js"></script>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0d1f3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/pwa.js" defer></script>
</head>
<body data-page="match-centre">

<div data-rdca="masthead"></div>
<div data-rdca="ticker"></div>

<header class="page-hero">
  <div class="page-hero-inner wide">
    <div class="crumb"><a href="/index.html">Home</a> <i class="ti ti-chevron-right"></i> <a href="/competition.html">Competition Hub</a> <i class="ti ti-chevron-right"></i> Match Centre</div>
    <div class="eyebrow">Live &middot; Today</div>
    <h1>Live Match Centre</h1>
    <p class="page-sub">Every RDCA game in one place — live scores, partnerships, last wickets and run chases across all grades. Tap any match for the full PlayHQ Match Centre.</p>
  </div>
</header>

<div class="page-wrap wide">
  <div class="hub-note">
    <i class="ti ti-info-circle"></i>
    <span id="mc-note"></span>
  </div>
  <div class="mc-grid" id="mc-mount"></div>
</div>

<div data-rdca="sponsor-carousel"></div>
<div data-rdca="footer"></div>

<script src="/playhq.js"></script>
<script src="/site-data.js"></script>
<script src="/rdca-render.js"></script>
<script>
  document.getElementById("mc-note").textContent =
    (window.RDCA_DATA && window.RDCA_DATA.matchCentreNote) || "";
  RDCA.render.matchCentre("#mc-mount");
</script>
</body>
</html>
